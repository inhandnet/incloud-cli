stages:
  - check
  - test
  - build
  - release

variables:
  GOPROXY: https://goproxy.cn,direct
  GONOSUMDB: "*"

default:
  image: golang:1.25
  tags:
    - docker
  before_script:
    - go version

lint:
  stage: check
  image: golangci/golangci-lint:v2.10.1
  script:
    - golangci-lint run ./...
  allow_failure: true

test:
  stage: test
  script:
    - CGO_ENABLED=0 go test ./... -v -count=1
  coverage: '/^total:\s+\(statements\)\s+(\d+\.\d+)%/'

build:
  stage: build
  script:
    - make build-all VERSION=${CI_COMMIT_TAG:-dev} COMMIT=$CI_COMMIT_SHORT_SHA
    - ls -lh bin/
  artifacts:
    paths:
      - bin/
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  tags:
    - docker
  before_script: []
  needs:
    - job: build
      artifacts: true
  script:
    - apk add --no-cache curl
    - |
      PKG_BASE="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/incloud-cli/${CI_COMMIT_TAG}"

      # Upload binaries to Generic Packages Registry
      for file in bin/incloud-*; do
        name=$(basename "$file")
        echo "Uploading $name..."
        curl --header "JOB-TOKEN: $CI_JOB_TOKEN" \
          --upload-file "$file" "${PKG_BASE}/${name}"
      done

      # Extract release notes from CHANGELOG.md for this version
      if [ -f CHANGELOG.md ]; then
        sed -n "/^# ${CI_COMMIT_TAG}/,/^# v/{/^# v/!p}" CHANGELOG.md | sed '1d' > /tmp/release_notes.md
      fi
      [ -s /tmp/release_notes.md ] || echo "Release ${CI_COMMIT_TAG}" > /tmp/release_notes.md

      # Create release with notes and asset links
      release-cli create \
        --name "${CI_COMMIT_TAG}" \
        --tag-name "${CI_COMMIT_TAG}" \
        --description "$(cat /tmp/release_notes.md)" \
        --assets-link "{\"name\":\"incloud-linux-amd64\",\"url\":\"${PKG_BASE}/incloud-linux-amd64\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"incloud-linux-arm64\",\"url\":\"${PKG_BASE}/incloud-linux-arm64\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"incloud-darwin-amd64\",\"url\":\"${PKG_BASE}/incloud-darwin-amd64\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"incloud-darwin-arm64\",\"url\":\"${PKG_BASE}/incloud-darwin-arm64\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"incloud-windows-amd64.exe\",\"url\":\"${PKG_BASE}/incloud-windows-amd64.exe\",\"link_type\":\"package\"}"
  rules:
    - if: $CI_COMMIT_TAG

stages:
  - check
  - test
  - build

variables:
  GOPROXY: https://goproxy.cn,direct
  GONOSUMDB: "*"

default:
  image: golang:1.25
  tags:
    - docker
  before_script:
    - go version

lint:
  stage: check
  image: golangci/golangci-lint:latest
  script:
    - golangci-lint run ./...
  allow_failure: true

test:
  stage: test
  script:
    - CGO_ENABLED=0 go test ./... -v -count=1
  coverage: '/^total:\s+\(statements\)\s+(\d+\.\d+)%/'

.build:
  stage: build
  script:
    - CGO_ENABLED=0 GOOS=${BUILD_OS} GOARCH=${BUILD_ARCH} go build
      -ldflags "-X main.version=${CI_COMMIT_TAG:-dev}"
      -o bin/incloud-${BUILD_OS}-${BUILD_ARCH}${BUILD_EXT} ./cmd/incloud
  artifacts:
    paths:
      - bin/
    expire_in: 7 days

build:linux-amd64:
  extends: .build
  variables:
    BUILD_OS: linux
    BUILD_ARCH: amd64

build:linux-arm64:
  extends: .build
  variables:
    BUILD_OS: linux
    BUILD_ARCH: arm64

build:darwin-amd64:
  extends: .build
  variables:
    BUILD_OS: darwin
    BUILD_ARCH: amd64

build:darwin-arm64:
  extends: .build
  variables:
    BUILD_OS: darwin
    BUILD_ARCH: arm64

build:windows-amd64:
  extends: .build
  variables:
    BUILD_OS: windows
    BUILD_ARCH: amd64
    BUILD_EXT: .exe

release:
  stage: build
  script:
    - |
      for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
        OS="${pair%/*}" ARCH="${pair#*/}" EXT=""
        [ "$OS" = "windows" ] && EXT=".exe"
        CGO_ENABLED=0 GOOS=$OS GOARCH=$ARCH go build \
          -ldflags "-X main.version=${CI_COMMIT_TAG}" \
          -o bin/incloud-${OS}-${ARCH}${EXT} ./cmd/incloud
      done
  artifacts:
    paths:
      - bin/
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+/

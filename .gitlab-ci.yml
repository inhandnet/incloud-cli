stages:
  - check
  - test
  - build

variables:
  GOPROXY: https://goproxy.cn,direct
  GONOSUMDB: "*"

default:
  image: golang:1.25
  tags:
    - docker
  before_script:
    - go version

lint:
  stage: check
  image: golangci/golangci-lint:v2.10.1
  script:
    - golangci-lint run ./...
  allow_failure: true

test:
  stage: test
  script:
    - CGO_ENABLED=0 go test ./... -v -count=1
  coverage: '/^total:\s+\(statements\)\s+(\d+\.\d+)%/'

build:
  stage: build
  script:
    - make build-all VERSION=${CI_COMMIT_TAG:-dev} COMMIT=$CI_COMMIT_SHORT_SHA
    - ls -lh bin/
  artifacts:
    paths:
      - bin/
    expire_in: 7 days
